# Spectra workspace quality gates — verify with Sentrux MCP: scan → check_rules → health

[project]
name = "spectra"
profile = "library"

[thresholds]
min_quality_signal = 7294
max_cycles = 0
max_new_f_dimensions = 0
max_coupling_score = 8.0
max_cross_module_edges = 80
min_test_coverage_line = 0.0

[constraints]
max_cc = 25
max_file_sloc = 450
max_file_loc = 700
max_fan_out = 15
no_god_files = true

# --- spectra-core must stay free of runtime, backends, facade, build, test ---

[[boundaries]]
from = "spectra-core/**"
to = "spectra-runtime/**"
reason = "Core must stay persistence/runtime-free"

[[boundaries]]
from = "spectra-core/**"
to = "spectra/src/**"
reason = "Core must not depend on public facade"

[[boundaries]]
from = "spectra-core/**"
to = "spectra-backend-mem/**"
