# Optional co-located data services for Spectra remote E2E / bench.
# TensorBase still requires the release binary (see bootstrap.sh); ClickHouse can use compose.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
